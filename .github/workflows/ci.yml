name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config libpipewire-0.3-dev libspa-0.2-dev pipewire

      - name: Start PipeWire
        run: |
          pipewire &
          sleep 2

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

  api-diff-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check public API signatures against base branch
        run: .github/scripts/check-api-diff.sh "origin/${{ github.base_ref }}"
