name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config libpipewire-0.3-dev libspa-0.2-dev pipewire

      - name: Start PipeWire
        run: |
          pipewire &
          sleep 2

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

  api-diff-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check public API signatures against base branch
        id: api_diff
        run: .github/scripts/check-api-diff.sh "origin/${{ github.base_ref }}" /tmp/api-diff-summary.md

      - name: Comment on the PR about API changes
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker="<!-- api-diff-check -->"
          pr_number="${{ github.event.pull_request.number }}"
          existing_id=$(gh api "repos/${{ github.repository }}/issues/$pr_number/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)

          if [ "${{ steps.api_diff.outputs.changed }}" = "true" ]; then
            body="$marker
          ### Public API signature change detected

          $(cat /tmp/api-diff-summary.md)

          This is a heads-up only; it does not block merging."
          elif [ -n "$existing_id" ]; then
            body="$marker
          ### Public API signature change no longer detected"
          else
            exit 0
          fi

          if [ -n "$existing_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$existing_id" -X PATCH -f body="$body"
          else
            gh api "repos/${{ github.repository }}/issues/$pr_number/comments" -X POST -f body="$body"
          fi
